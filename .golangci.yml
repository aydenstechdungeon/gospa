version: 2
run:
  # Pin Go version to match go.mod, preventing pre-release toolchain typecheck failures.
  # The system uses go1.26.0-X (pre-release) which does not satisfy the `go1.26` build
  # tag in vendored crypto, cascading into false-positive fiber/v2 typecheck errors.
  go: "1.26"

linters:
  enable:
    - revive       # Replacement for golint
    - staticcheck  # Go vet on steroids
    - gocritic    # Catches style and perf issues
    - errcheck    # Ensures errors are handled
    - misspell    # Catches typos
    - gosec       # Basic security checks
    - nolintlint  # Ensures nolint comments are valid

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck # Often ignored in tests