# GoSPA configuration for website
# Uses postcss plugin for Tailwind CSS v4 compilation

plugins:
  postcss:
    enabled: true
    # Input CSS file with Tailwind v4 directives
    input: styles/main.css
    # Output compiled CSS
    output: static/css/main.css
    # Enable watching in development
    watch: true
    bundles:
      - name: website
        input: styles/website.css
        output: static/css/website.css
        criticalCSS:
          enabled: true
          criticalOutput: static/css/website.critical.css
          nonCriticalOutput: static/css/website.non-critical.css
          inlineMaxSize: 20480
      - name: docs
        input: styles/docs.css
        output: static/css/docs.css
        criticalCSS:
          enabled: true
          criticalOutput: static/css/docs.critical.css
          nonCriticalOutput: static/css/docs.non-critical.css
          inlineMaxSize: 20480
