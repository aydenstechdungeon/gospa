name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebp-dev libheif-dev
          go install github.com/a-h/templ/cmd/templ@v0.3.1001

      - name: Generate templ files
        run: templ generate ./...

      - name: Go test
        run: |
          PKGS="$(go list ./... | grep -v node_modules | tr '\n' ' ')"
          go test $PKGS -count=1

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          PKGS="$(go list ./... | grep -v node_modules | tr '\n' ' ')"
          "$(go env GOPATH)/bin/govulncheck" $PKGS

      - name: govulncheck (website module)
        working-directory: website
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          PKGS="$(go list ./... | grep -v node_modules | tr '\n' ' ')"
          "$(go env GOPATH)/bin/govulncheck" $PKGS

      - name: go build
        run: |
          PKGS="$(go list ./... | grep -v node_modules | tr '\n' ' ')"
          go build $PKGS

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.4"

      - name: Bun install & check
        working-directory: client
        run: |
          bun install --frozen-lockfile
          bun check
          bun test

  js-security:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [client, website, vscode-extension]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - name: Bun audit (high+)
        working-directory: ${{ matrix.workspace }}
        run: |
          bun install --frozen-lockfile
          bun audit --audit-level high

  docs-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Broken docs links check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --include-fragments --exclude-path docs/llms/llms-full.md docs/**/*.md README.md website/docs_improvement_plan.md

      - name: Docs route + search index validation
        run: |
          go run ./scripts/validate-docs-routes/main.go

      - name: Helper promotion gate
        run: |
          go run ./scripts/validate-helper-promotion/main.go
