name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebp-dev libheif-dev

      - name: Go test
        run: |
          PKGS="$(go list ./... | grep -v node_modules | tr '\n' ' ')"
          go test $PKGS -count=1

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          PKGS="$(go list ./... | grep -v node_modules | tr '\n' ' ')"
          govulncheck $PKGS

      - name: go build
        run: |
          PKGS="$(go list ./... | grep -v node_modules | tr '\n' ' ')"
          go build $PKGS

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Bun install & check
        working-directory: client
        run: |
          bun install --frozen-lockfile
          bun check
          bun test
